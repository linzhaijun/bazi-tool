<body>
<div class="container">
<h1>🔮 八字命理 · 姓名改运</h1>

<script>
const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const YDZ=['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
const SX=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const WX={'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
const ZW={'子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'};
const DZC={'子':['癸'],'丑':['己','癸','辛'],'寅':['甲','丙','戊'],'卯':['乙'],'辰':['戊','乙','癸'],'巳':['丙','戊','庚'],'午':['丁','己'],'未':['己','丁','乙'],'申':['庚','壬','戊'],'酉':['辛'],'戌':['戊','辛','丁'],'亥':['壬','甲']};
const JI_NUM={1:1,3:1,5:1,6:1,7:1,11:1,15:1,16:1,17:1,18:1,21:1,23:1,24:1,25:1,31:1,32:1,33:1,35:1,37:1,39:1,41:1,45:1,47:1,48:1,52:1,57:1,58:1,61:1,63:1,65:1,67:1,68:1,75:1,81:1};
const XIONG_NUM={2:1,4:1,9:1,10:1,12:1,14:1,19:1,20:1,22:1,26:1,27:1,28:1,30:1,34:1,36:1,40:1,43:1,44:1,46:1,50:1,51:1,53:1,54:1,56:1,59:1,60:1,62:1,64:1,66:1,69:1,70:1,74:1,76:1,77:1,79:1,80:1};
const NUM_NAME={1:'万物更新',3:'名利双收',5:'福寿双美',6:'富裕平安',7:'刚顽俊敏',11:'万象更新',15:'福寿双美',16:'厚重载德',17:'刚顽俊敏',18:'坚毅克己',21:'万象更新',23:'壮丽果敢',24:'前程似锦',25:'英迈俊敏',31:'大吉之数',32:'大将威风',33:'刚强机敏',35:'保守平安',37:'威德显赫',39:'富贵荣华',41:'德望高大',45:'顺风扬帆',47:'点铁成金',48:'德才兼备',52:'先见之明',57:'寒梅吐艳',58:'先苦后甜',61:'荣华繁达',63:'富达贵重',65:'名财兼得',67:'自我增进',68:'霸气成仁',75:'英迈退安',81:'春风怡人',19:'多成多败',20:'破灭败身',27:'内外不和',28:'内外不和',9:'贫苦逆恶'};
const STO={'林':8,'海':11,'钖':16,'炜':8,'臻':16,'陵':10,'旭':6,'朗':10,'屹':6,'陶':11,'坦':8,'德':15,'坤':8,'宥':9,'煜':13,'畅':8,'辉':15,'昊':8,'阳':12,'城':9,'安':6,'宇':6,'峰':10,'基':11,'培':11,'圣':13,'恩':10,'山':3,'昭':9,'均':7,'峻':10,'睿':14,'天':4,'润':16,'炎':8,'明':8,'昕':8,'昱':9,'皓':12,'烨':14,'煌':13,'晔':14,'光':6,'亮':9,'灿':7,'晟':11,'晖':13,'晴':12,'暖':13,'隆':12,'嵩':13,'磊':15,'岩':8,'岳':8,'石':5,'岗':11,'崇':11,'陆':10,'垒':9,'坚':7,'柏':9,'松':8,'桐':10,'楷':13,'樑':15,'荣':14,'栋':12,'森':12,'植':12,'彬':11,'宸':10,'瑜':14,'玟':8,'玺':19,'玮':14,'琨':13,'璋':15,'耀':20,'曦':20,'曜':18,'晏':10};
const CHW={'林':'木','海':'水','钖':'金','炜':'火','臻':'土','陵':'土','旭':'火','朗':'火','屹':'土','陶':'土','坦':'土','德':'火','坤':'土','宥':'土','煜':'火','畅':'火','辉':'火','昊':'火','阳':'火','城':'土','安':'土','宇':'土','峰':'土','基':'土','培':'土','圣':'土','恩':'火','山':'土','昭':'火','均':'土','峻':'土','睿':'火','天':'火','润':'水','炎':'火','明':'火','昕':'火','昱':'火','皓':'火','烨':'火','煌':'火','晔':'火','光':'火','亮':'火','灿':'火','晟':'火','晖':'火','晴':'火','暖':'火','隆':'土','嵩':'土','磊':'土','岩':'土','岳':'土','石':'土','岗':'土','崇':'土','陆':'土','垒':'土','坚':'土','柏':'木','松':'木','桐':'木','楷':'木','樑':'木','荣':'木','栋':'木','森':'木','植':'木','彬':'木','宸':'金','瑜':'金','玟':'金','玺':'金','玮':'土','琨':'金','璋':'金','耀':'火','曦':'火','曜':'火','晏':'火'};

// ===== 八字节气排盘（已验证） =====
const JIE = [[2,4,'寅'],[3,6,'卯'],[4,5,'辰'],[5,5,'巳'],[6,6,'午'],[7,7,'未'],[8,7,'申'],[9,7,'酉'],[10,8,'戌'],[11,7,'亥'],[12,7,'子'],[1,6,'丑']];

function getYueZhi(m,d){
  if(m===1&&d<6)return '子';
  if(m===2&&d<4)return '丑';
  for(let i=0;i<JIE.length;i++){
    let b=JIE[i];
    if(m===b[0]){if(d>=b[1])return b[2];return JIE[(i-1+12)%12][2];}
  }
  return '寅';
}
function getYueGan(yg,m,d){
  let z=getYueZhi(m,d),zi=YDZ.indexOf(z);
  const off={甲:2,己:2,乙:4,庚:4,丙:6,辛:6,丁:8,壬:8,戊:0,癸:0};
  return TG[(off[yg]+zi)%10];
}
function getRiGZ(y,m,d){
  // 基准: 2012-4-18 = 己酉(天干5,地支9)
  let refJd=2456036;
  function jd(yy,mm,dd){return 367*yy-Math.floor(7*(yy+Math.floor((mm+9)/12))/4)+Math.floor(275*mm/9)+dd+1721014;}
  let diff=jd(y,m,d)-refJd;
  return{gan:TG[((5+diff)%10+10)%10],zhi:DZ[((9+diff)%12+12)%12]};
}

function calcNian(year){
  let g=(year-4)%10,z=(year-4)%12;
  if(g<0)g+=10;if(z<0)z+=12;
  return{gan:TG[g],zhi:DZ[z],sx:SX[z]};
}

function calcShi(riGan,hour){
  const zm={23:0,0:0,1:1,2:1,3:2,4:2,5:3,6:3,7:4,8:4,9:5,10:5,11:6,12:6,13:7,14:7,15:8,16:8,17:9,18:9,19:10,20:10,21:11,22:11};
  let zi=zm[hour]!==undefined?zm[hour]:0;
  const ws={甲:0,己:0,乙:2,庚:2,丙:4,辛:4,丁:6,壬:6,戊:8,癸:8};
  return{gan:TG[(ws[riGan]+zi)%10],zhi:DZ[zi]};
}
function getSS(rg,g){
  if(g===rg)return'日主';
  let d=(TG.indexOf(g)-TG.indexOf(rg)+10)%10;
  return['比肩','劫财','食神','伤官','偏财','正财','七杀','正官','偏印','正印'][d];
}
function calcWx(bz){
  let s={水:0,木:0,火:0,土:0,金:0};
  ['nian','yue','ri','shi'].forEach(p=>{
    s[WX[bz[p].gan]]+=1;s[ZW[bz[p].zhi]]+=1;
    (DZC[bz[p].zhi]||[]).forEach(c=>s[WX[c]]+=0.3);
  });
  return s;
}

function wxFromNum(n){let m=n%10;return m in{1:1,2:1}?'木':m in{3:1,4:1}?'火':m in{5:1,6:1}?'土':m in{7:1,8:1}?'金':'水';}
function numType(n){if(JI_NUM[n])return{type:'吉',cls:'eg'};if(XIONG_NUM[n])return{type:'凶',cls:'eb'};return{type:'半吉',cls:'ew'};}

function analyzeName(xing,first,second){
  let s1=STO[xing]||8,s2=STO[first]||8,s3=STO[second]||8;
  let tian=s1+1,ren=s1+s2,di=s2+s3,zong=s1+s2+s3,wai=s3+1;
  let w1=CHW[first]||'',w2=CHW[second]||'';
  let details=[
    {name:'天格',num:tian,...numType(tian),note:'祖运'},
    {name:'人格(主运)',num:ren,...numType(ren),note:'',wx:wxFromNum(ren),key:true},
    {name:'地格(前运)',num:di,...numType(di),note:'',wx:wxFromNum(di)},
    {name:'总格(后运)',num:zong,...numType(zong),note:'',wx:wxFromNum(zong)},
    {name:'外格(辅助)',num:wai,...numType(wai),note:'',wx:wxFromNum(wai)},
  ];
  let score=0;
  details.forEach(d=>{
    if(d.type==='吉')score+=20;else if(d.type==='半吉')score+=8;
    if(d.key){if(d.wx==='土'||d.wx==='火')score+=10;}
  });
  if(w1==='火'||w1==='土')score+=10;if(w2==='火'||w2==='土')score+=8;
  score=Math.min(100,Math.max(0,score));
  return {s1,s2,s3,details,score,w1,w2,ren,di,zong,wai,tian};
}

function analyze(){
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='🔍 分析中...';
  const name=document.getElementById('nameInput').value||'未知';
  const gender=document.getElementById('genderInput').value;
  const ds=document.getElementById('dateInput').value;
  const hour=parseInt(document.getElementById('hourInput').value);
  const loc=document.getElementById('locationInput').value||'未知';
  const curName=document.getElementById('curNameInput').value;
  const gen=document.getElementById('genderInput').value;if(!gen){alert('请选择性别');btn.disabled=false;btn.textContent='🔍 全面分析';return;}if(!ds){alert('请选择出生日期（公历/阳历）');btn.disabled=false;btn.textContent='🔍 全面分析';return;}
  const p=ds.split('-');
  const year=parseInt(p[0]),month=parseInt(p[1]),day=parseInt(p[2]);
  const riGZ=getRiGZ(year,month,day);
  const nian={gan:TG[(year-4)%10],zhi:DZ[(year-4)%12],sx:SX[(year-4)%12]};
  const yue={gan:getYueGan(nian.gan,month,day),zhi:getYueZhi(month,day)};
  const shi=calcShi(riGZ.gan,hour);
  const bazi={nian,yue,ri:riGZ,shi};
  const scores=calcWx(bazi);
  const maxV=Math.max(...Object.values(scores))||1;
  const levels={};Object.entries(scores).forEach(([k,v])=>{let r=v/maxV;levels[k]=r>=0.85?'极旺':r>=0.6?'偏旺':r>=0.35?'适中':r>=0.15?'偏弱':'极弱';});
  
  // 用神
  const yongshen=[];
  if(scores['水']>scores['火']+1)yongshen.push({n:'火',t:'use',d:'暖局调候（第一用神）'});
  if(scores['土']<2.5)yongshen.push({n:'土',t:'use',d:'制水帮身（第二用神）'});
  yongshen.push({n:'木',t:'xi',d:'泄水（喜神）'});
  yongshen.push({n:'金',t:'ji',d:'生水（忌神）'});
  if(scores['水']>3)yongshen.push({n:'水',t:'ji',d:'已过旺（忌神）'});
  
  // 大运
  let isYang=TG.indexOf(bazi.ri.gan)%2===0,isShun=(isYang&&gender==='male')||(!isYang&&gender!=='male');
  let sg=TG.indexOf(bazi.yue.gan),sz=DZ.indexOf(bazi.yue.zhi);
  const dayun=[];
  // 简化：从月柱起7步
  for(let i=1;i<=6;i++){
    let step=isShun?i:-i;
    let g=(sg+step+10)%10,z=(sz+step+12)%12;
    dayun.push({gan:TG[g],zhi:DZ[z],label:TG[g]+DZ[z],period:`${30+i*10}岁后`});
  }
  
  // 流年近8年
  const lns=[];

function st(el,tid){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tid).classList.add('active');
  el.classList.add('active');
}
